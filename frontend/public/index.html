<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1a2e" />

    <!-- Security: Force HTTPS for all resources and prevent mixed content -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests; default-src 'self' https:; script-src 'self' https: 'unsafe-inline' 'unsafe-eval'; style-src 'self' https: 'unsafe-inline'; img-src 'self' https: data: blob:; font-src 'self' https: data:; connect-src 'self' https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https:" />

    <!-- Security: Prevent clickjacking -->
    <meta http-equiv="X-Frame-Options" content="DENY" />

    <!-- Security: Prevent MIME-type sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Security: XSS protection for legacy browsers -->
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />

    <!-- Security: Control referrer leakage -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- ✅ PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ✅ Mobile App Capability -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dolaglobo" />

    <!-- ✅ Splash Screen (basic support) -->
    <link rel="apple-touch-startup-image" href="/splash.png" />

    <!-- Primary SEO Meta Tags -->
    <title>Dolaglobo Finance - Digital Wallet & Financial Services in Kenya</title>
    <meta name="title" content="Dolaglobo Finance - Digital Wallet & Financial Services in Kenya" />
    <meta name="description" content="Dolaglobo Finance offers secure digital wallet services, instant M-Pesa deposits & withdrawals, personal loans, savings accounts, and airtime purchases. Join thousands of Kenyans managing their finances smarter." />
    <meta name="keywords" content="digital wallet Kenya, M-Pesa wallet, mobile money, personal loans Kenya, savings account, airtime purchase, financial services Kenya, Dolaglobo, send money Kenya, mobile banking" />
    <meta name="author" content="Dolaglobo Finance" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://dolaglobo.co.ke" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dolaglobo.co.ke/" />
    <meta property="og:title" content="Dolaglobo Finance - Digital Wallet & Financial Services in Kenya" />
    <meta property="og:description" content="Secure digital wallet services with instant M-Pesa integration, personal loans, savings accounts, and airtime purchases." />
    <meta property="og:image" content="https://dolaglobo.co.ke/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://dolaglobo.co.ke/" />
    <meta property="twitter:title" content="Dolaglobo Finance - Digital Wallet & Financial Services in Kenya" />
    <meta property="twitter:description" content="Secure digital wallet services with instant M-Pesa integration." />
    <meta property="twitter:image" content="https://dolaglobo.co.ke/og-image.png" />

    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" sizes="512x512" href="/icon-512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

</head>

<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="root"></div>

    <!-- Keep your PostHog script unchanged -->
</body>
</html>
